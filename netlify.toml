[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[redirects]]
  from = "/associations"
  to = "/vie-locale"
  status = 301

[[redirects]]
  from = "/associations/"
  to = "/vie-locale/"
  status = 301

[[redirects]]
  from = "/actualites"
  to = "/vie-locale"
  status = 301

[[redirects]]
  from = "/actualites/"
  to = "/vie-locale/"
  status = 301

[[redirects]]
  from = "/actualites/:slug"
  to = "/vie-locale/:slug"
  status = 301

[[headers]]
  for = "/editeur/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Robots-Tag = "noindex, nofollow"
